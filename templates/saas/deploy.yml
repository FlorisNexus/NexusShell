name: Deploy SaaS (Infrastructure & App)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Infrastructure (Bicep)
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}-${{ env.ENVIRONMENT }}
          template: ./infra/main.bicep
          parameters: ./infra/${{ env.ENVIRONMENT }}.bicepparam
          failOnStdErr: false

  deploy-apps:
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Build & Publish Web
        run: dotnet publish src/Web/Web.csproj -c Release -o ./publish/web

      - name: Build & Publish Functions
        run: dotnet publish src/Functions/Functions.csproj -c Release -o ./publish/func

      - name: Deploy Web to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: app-${{ secrets.PROJECT_NAME }}-${{ env.ENVIRONMENT }}
          package: ./publish/web

      - name: Deploy Functions to Azure
        uses: azure/functions-action@v1
        with:
          app-name: func-${{ secrets.PROJECT_NAME }}-${{ env.ENVIRONMENT }}
          package: ./publish/func
